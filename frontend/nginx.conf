server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        # Using the public URL as a fallback to ensure 100% connectivity
        set $backend_url https://smartqx-backend.onrender.com;
        proxy_pass $backend_url/;
        proxy_set_header Host smartqx-backend.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
    }

    location /ws {
        # proxy_pass to the backend WebSocket endpoint
        set $backend_url https://smartqx-backend.onrender.com;
        proxy_pass $backend_url/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host smartqx-backend.onrender.com;
        proxy_ssl_server_name on;
    }
}
