server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        # Use a variable for the backend host to prevent Nginx from crashing if the host is not found at startup
        resolver 127.0.0.11 valid=30s;
        set $backend_url http://smartqx-backend:10000;
        proxy_pass $backend_url/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws {
        # proxy_pass to the backend WebSocket endpoint
        resolver 127.0.0.11 valid=30s;
        set $backend_url http://smartqx-backend:10000;
        proxy_pass $backend_url/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
